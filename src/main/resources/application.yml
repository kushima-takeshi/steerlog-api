spring:
  application:
    name: steerlog-api

  datasource:
    url: jdbc:postgresql://localhost:5432/steerlog
    username: steerlog
    password: steerlog
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.flywaydb: INFO
